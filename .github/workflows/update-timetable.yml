name: Update Timetable Data

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install httpx shapely pyproj
          python -c "import httpx, shapely, pyproj; print('httpx', httpx.__version__, 'shapely', shapely.__version__, 'pyproj', pyproj.__version__, 'OK')"

      - name: Compile check
        run: python -m py_compile scripts/build_timetable.py

      - name: Verify script imports
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from scripts.build_timetable import main, parse_gtfs
          print('Import OK')
          "

      - name: Build timetable
        run: python -u scripts/build_timetable.py

      - name: Build zone boundaries
        run: python -u scripts/build_zones.py

      - name: Check output
        run: |
          ls -lh data/
          python -c "
          import json, sys
          with open('data/timetable.json') as f:
              d = json.load(f)
          stops = len(d.get('stops', {}))
          routes = len(d.get('routes', {}))
          trips = len(d.get('trips', {}))
          stop_times = len(d.get('stop_times', {}))
          print(f'stops: {stops}')
          print(f'routes: {routes}')
          print(f'trips: {trips}')
          print(f'stop_times: {stop_times}')
          if stop_times == 0:
              print('WARNING: timetable is empty — no stop_times found')
              sys.exit(1)
          "

      - name: Commit timetable if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add data/timetable.json data/zones/
          git diff --staged --quiet || git commit -m "Update timetable data [skip ci]"
          git push
