name: Update Timetable Data

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install httpx
          python -c "import httpx; print('httpx OK')"

      - name: Test script can be imported
        env:
          BODS_API_KEY: ${{ secrets.BODS_API_KEY }}
        run: |
          python -c "
          import os
          key = os.environ.get('BODS_API_KEY', '')
          print(f'API key present: {bool(key)}')
          print(f'API key length: {len(key)}')
          "

      - name: Build timetable
        env:
          BODS_API_KEY: ${{ secrets.BODS_API_KEY }}
        run: |
          set -x
          python scripts/build_timetable.py

      - name: Check output
        run: |
          ls -lh data/
          python -c "
          import json
          with open('data/timetable.json') as f:
              d = json.load(f)
          print('stops:', len(d.get('stops', {})))
          print('routes:', len(d.get('routes', {})))
          print('trips:', len(d.get('trips', {})))
          print('stop_times:', len(d.get('stop_times', {})))
          "

- name: Commit timetable if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/timetable.json
          git diff --staged --quiet || git commit -m "Update timetable data [skip ci]"
          git push
