name: Update Timetable Data

on:
  schedule:
    # Run every Sunday at 3am UTC — timetables change weekly at most
    - cron: "0 3 * * 0"
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

      - name: Build timetable
        env:
          BODS_API_KEY: ${{ secrets.BODS_API_KEY }}
        run: python scripts/build_timetable.py

      - name: Commit timetable if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/timetable.json
          git diff --staged --quiet || git commit -m "Update timetable data [skip ci]"
          git push
