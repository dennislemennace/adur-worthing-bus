name: Update Timetable Data

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install httpx shapely pyproj
          python -c "import httpx, shapely, pyproj; print('httpx', httpx.__version__, 'shapely', shapely.__version__, 'pyproj', pyproj.__version__, 'OK')"

      - name: Compile check
        run: |
          python -m py_compile scripts/build_timetable.py
          python -m py_compile scripts/json_to_sqlite.py

      - name: Build timetable JSON
        run: python -u scripts/build_timetable.py

      - name: Convert to SQLite
        run: python -u scripts/json_to_sqlite.py

      - name: Build zone boundaries
        run: python -u scripts/build_zones.py

      - name: Check output
        run: |
          ls -lh data/
          python -c "
          import sqlite3
          con = sqlite3.connect('data/timetable.sqlite')
          rows = {t: con.execute(f'SELECT COUNT(*) FROM {t}').fetchone()[0] for t in ['stops','routes','trips','stop_times','calendar','calendar_dates']}
          for t, n in rows.items():
              print(f'{t}: {n}')
          if rows['stop_times'] == 0:
              raise SystemExit('empty timetable — aborting')
          "

      - name: Publish timetable to rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="timetable-latest"
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" data/timetable.sqlite \
            --title "Timetable $(date -u +%Y-%m-%d)" \
            --notes "Built $(date -u +%Y-%m-%dT%H:%M:%SZ) by $GITHUB_WORKFLOW"

      - name: Commit zone boundaries if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add data/zones/
          git diff --staged --quiet || git commit -m "Update zone boundaries [skip ci]"
          git push

      - name: Trigger Render redeploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret not set — skipping redeploy."
            exit 0
          fi
          curl -fsSL -X POST "$HOOK"
