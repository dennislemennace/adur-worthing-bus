# render.yaml — Deployment config for Render.com free tier
#
# Render gives us a persistent server, so the in-memory cache in
# api/main.py works correctly between requests.
#
# SETUP STEPS:
#   1. Create a free account at https://render.com
#   2. Click "New +" → "Web Service"
#   3. Connect your GitHub repository
#   4. Render will auto-detect this file and configure itself
#   5. In the Render dashboard, go to:
#        Service → Environment → Add Environment Variable
#      Add:
#        BODS_API_KEY   = <your BODS API key>
#        ALLOWED_ORIGIN = https://yourusername.github.io   (your GitHub Pages URL)

services:
  - type: web
    name: adur-worthing-bus-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: BODS_API_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
