# render.yaml — Deployment config for Render.com free tier
#
# Timetable data lives in the "timetable-latest" GitHub Release (built
# weekly by .github/workflows/update-timetable.yml) and is fetched at
# build time so the git repo stays small.
#
# SETUP STEPS:
#   1. Create a free account at https://render.com
#   2. Click "New +" → "Web Service"
#   3. Connect your GitHub repository
#   4. Render will auto-detect this file and configure itself
#   5. In the Render dashboard, go to:
#        Service → Environment → Add Environment Variable
#      Add:
#        BODS_API_KEY   = <your BODS API key>
#        ALLOWED_ORIGIN = https://yourusername.github.io   (your GitHub Pages URL)
#   6. Copy the deploy hook URL from Settings → Deploy Hook and add it
#      to the GitHub repo as secret RENDER_DEPLOY_HOOK so the weekly
#      workflow can trigger a redeploy after publishing fresh data.

services:
  - type: web
    name: adur-worthing-bus-api
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      mkdir -p data
      curl -fsSL -o data/timetable.sqlite \
        "https://github.com/dennislemennace/adur-worthing-bus/releases/download/timetable-latest/timetable.sqlite"
      python -c "import sqlite3; c=sqlite3.connect('data/timetable.sqlite'); n=c.execute('SELECT COUNT(*) FROM stop_times').fetchone()[0]; print(f'stop_times rows: {n}'); assert n > 0"
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: BODS_API_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
